<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Panda Royale Score Calculator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #2d5a27; text-align: center; }
        .row { display: flex; align-items: center; margin-bottom: 10px; padding: 10px; border-radius: 8px; }
        .row label { flex: 1; font-weight: bold; }
        .row input { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        /* Farben passend zum Spiel */
        .yellow { background: #fff9c4; } .purple { background: #e1bee7; } .blue { background: #bbdefb; }
        .red { background: #ffcdd2; } .green { background: #c8e6c9; } .total-box { background: #2d5a27; color: white; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Panda Royale 🐼</h1>
        <div class="row yellow"><label>Gelb (Summe):</label><input type="number" id="y" oninput="calc()"></div>
        <div class="row purple"><label>Lila (Summe x 2):</label><input type="number" id="p" oninput="calc()"></div>
        <div class="row blue"><label>Blau (Summe):</label><input type="number" id="b" oninput="calc()">
            <input type="checkbox" id="glitter" onchange="calc()"> ✨</div>
        <div class="row red"><label>Rot (Netto x Anzahl):</label><input type="number" id="r" oninput="calc()"></div>
        <div class="row green"><label>Grün (Summe):</label><input type="number" id="g" oninput="calc()"></div>
        
        <div class="row total-box">
            <label>Runden-Gesamtpunktzahl:</label>
            <span id="result">0</span>
        </div>
    </div>

    <script>
        function calc() {
            let y = Number(document.getElementById('y').value) || 0;
            let p = (Number(document.getElementById('p').value) || 0) * 2;
            let b = Number(document.getElementById('b').value) || 0;
            if(document.getElementById('glitter').checked) b *= 2;
            let r = Number(document.getElementById('r').value) || 0; // Vereinfacht für das Tool
            let g = Number(document.getElementById('g').value) || 0;
            
            document.getElementById('result').innerText = y + p + b + r + g;
        }
    </script>
</body>
</html>
