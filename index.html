<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Panda Royale Scoreboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3a16; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 1100px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #2d5a27; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { color: white; padding: 10px; font-size: 0.7em; text-transform: uppercase; background: #2d5a27; border: 1px solid white; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        
        /* Farb-Anpassungen */
        .col-runde { background: #2d5a27; color: white; font-weight: bold; }
        .col-gelb { background: #fce903; } 
        .col-lila { background: #f3e5f5; }
        .col-blau { background: #e3f2fd; } 
        .col-rot { background: #ffcdd2; border: 2px solid #e57373 !important; } /* Kräftiges Rot */
        .col-weiss { background: #ffffff; border: 1px solid #ddd !important; }
        .col-pink { background: #fce4ec; }
        .col-total { background: #1a3a16; color: #a5d6a7; font-weight: bold; width: 60px; }

        input { width: 40px; height: 30px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; vertical-align: middle; }
        
        /* Rote Spalte Eingabefelder */
        .red-grid { display: flex; gap: 3px; justify-content: center; font-size: 9px; color: #b71c1c; }
        .red-grid div { display: flex; flex-direction: column; align-items: center; }
        .red-grid input { border: 1px solid #e57373; background: #fff; }

        .footer { margin-top: 20px; border-top: 3px solid #2d5a27; padding-top: 15px; text-align: right; font-size: 2em; font-weight: bold; color: #1a3a16; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Panda Royale 🐼</h1>
        <table>
            <thead>
                <tr>
                    <th>Runde</th>
                    <th class="col-gelb">Gelb (Σ)</th>
                    <th class="col-lila">Lila (Σ)<br>Auto x2</th>
                    <th class="col-blau">Blau (Σ)<br>Glitzer? ✨</th>
                    <th class="col-rot">Rot (W-S)xAnz</th>
                    <th class="col-weiss">Weiß (Σ)</th>
                    <th class="col-pink">Pink (Σ)</th>
                    <th class="col-total">Runde</th>
                </tr>
            </thead>
            <tbody id="board"></tbody>
        </table>
        <div class="footer">Gesamt: <span id="grandTotal">0</span></div>
    </div>

    <script>
        const board = document.getElementById('board');
        for (let r = 1; r <= 10; r++) {
            board.innerHTML += `
                <tr id="r-${r}">
                    <td class="col-runde">Runde ${r}</td>
                    <td class="col-gelb"><input type="number" class="v-y" oninput="c(${r})"></td>
                    <td class="col-lila"><input type="number" class="v-p" oninput="c(${r})"></td>
                    <td class="col-blau">
                        <input type="number" class="v-b" oninput="c(${r})">
                        <input type="checkbox" class="v-bg" onchange="c(${r})">
                    </td>
                    <td class="col-rot">
                        <div class="red-grid">
                            <div><span>W</span><input type="number" class="rW" oninput="c(${r})"></div>
                            <div><span>S</span><input type="number" class="rS" oninput="c(${r})"></div>
                            <div><span>#</span><input type="number" class="rA" oninput="c(${r})"></div>
                        </div>
                    </td>
                    <td class="col-weiss"><input type="number" class="v-w" oninput="c(${r})"></td>
                    <td class="col-pink"><input type="number" class="v-pi" oninput="c(${r})"></td>
                    <td class="col-total"><span id="s-${r}">0</span></td>
                </tr>`;
        }

        function c(r) {
            const row = document.getElementById(`r-${r}`);
            const y = Number(row.querySelector('.v-y').value) || 0;
            const p = (Number(row.querySelector('.v-p').value) || 0) * 2;
            let b = Number(row.querySelector('.v-b').value) || 0;
            if(row.querySelector('.v-bg').checked) b *= 2;
            
            const rW = Number(row.querySelector('.rW').value) || 0;
            const rS = Number(row.querySelector('.rS').value) || 0;
            const rA = Number(row.querySelector('.rA').value) || 0;
            const red = (rW - rS) * rA;
            
            const w = Number(row.querySelector('.v-w').value) || 0;
            const pi = Number(row.querySelector('.v-pi').value) || 0;
            
            const total = y + p + b + red + w + pi;
            document.getElementById(`s-${r}`).innerText = total;
            
            let g = 0;
            for(let i=1; i<=10; i++) g += Number(document.getElementById(`s-${i}`).innerText) || 0;
            document.getElementById('grandTotal').innerText = g;
        }
    </script>
</body>
</html>
