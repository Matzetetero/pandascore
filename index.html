<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Panda Royale 10-Runden Rechner</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f4; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #2d5a27; color: white; }
        input { width: 50px; border: 1px solid #ccc; padding: 4px; text-align: center; }
        .total-row { font-weight: bold; background: #e8f5e9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panda Royale 🐼</h1>
        <table>
            <thead>
                <tr>
                    <th>Runde</th>
                    <th>Punkte</th>
                </tr>
            </thead>
            <tbody id="rounds">
                <!-- Erzeugt 10 Zeilen -->
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td>Gesamt:</td>
                    <td id="grandTotal">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        const tbody = document.getElementById('rounds');
        for (let i = 1; i <= 10; i++) {
            tbody.innerHTML += `<tr><td>Runde ${i}</td><td><input type="number" class="score" oninput="sumTotal()"></td></tr>`;
        }

        function sumTotal() {
            let total = 0;
            document.querySelectorAll('.score').forEach(input => {
                total += Number(input.value) || 0;
            });
            document.getElementById('grandTotal').innerText = total;
        }
    </script>
</body>
</html>
