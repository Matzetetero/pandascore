<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Royale Scoreboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a3a16; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 95%; max-width: 1200px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #2d5a27; padding-bottom: 10px; }
        h1 { color: #2d5a27; margin: 0; font-size: 2.5em; }
        
        table { width: 100%; border-collapse: collapse; }
        th { color: white; padding: 10px; font-size: 0.8em; text-transform: uppercase; background: #2d5a27; border: 1px solid white; }
        td { border: 1px solid #eee; padding: 6px; text-align: center; }
        
        .col-runde { background: #2d5a27; color: white; font-weight: bold; width: 90px; }
        .col-gelb { background: #fce903; } 
        .col-lila { background: #f3e5f5; }
        .col-blau { background: #e3f2fd; } 
        .col-gruen { background: #c8e6c9; } /* Neue Farbe für Grün */
        .col-rot { background: #ffcdd2; border: 2px solid #e57373 !important; }
        .col-weiss { background: #ffffff; border: 1px solid #ddd !important; }
        .col-pink { background: #fce4ec; }
        .col-total { background: #1a3a16; color: #a5d6a7; font-weight: bold; width: 70px; font-size: 1.2em; }

        input { width: 45px; height: 35px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; font-size: 1.1em; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; vertical-align: middle; }
        
        .red-grid { display: flex; gap: 4px; justify-content: center; font-size: 10px; color: #b71c1c; font-weight: bold; }
        .red-grid div { display: flex; flex-direction: column; align-items: center; }
        .red-grid input { width: 32px; height: 28px; font-size: 0.9em; border: 1px solid #e57373; }

        .footer { margin-top: 20px; border-top: 5px solid #2d5a27; padding-top: 15px; text-align: right; font-size: 2.5em; font-weight: bold; color: #1a3a16; }
        
        .reset-btn { padding: 12px 25px; background: #d32f2f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; box-shadow: 0 4px 0 #9a1f1f; }
        .reset-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #9a1f1f; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-area">
            <h1>Panda Royale 🐼</h1>
            <button class="reset-btn" onclick="resetBoard()">Reset ↺</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Runde</th>
                    <th class="col-gelb" style="color:black">Gelb (Σ)</th>
                    <th class="col-lila" style="color:black">Lila (Σ)<br>x2</th>
                    <th class="col-blau" style="color:black">Blau (Σ)<br>Glitzer ✨</th>
                    <th class="col-gruen" style="color:black">Grün (Σ)</th> <!-- Header Neu -->
                    <th class="col-rot" style="color:black">Rot (W-S)x#</th>
                    <th class="col-weiss" style="color:black">Weiß (Σ)</th>
                    <th class="col-pink" style="color:black">Pink (Σ)</th>
                    <th class="col-total">Σ</th>
                </tr>
            </thead>
            <tbody id="board"></tbody>
        </table>
        <div class="footer">Gesamt: <span id="grandTotal">0</span></div>
    </div>

    <script>
        const board = document.getElementById('board');
        
        for (let r = 1; r <= 10; r++) {
            board.innerHTML += `
                <tr id="r-${r}">
                    <td class="col-runde">Runde ${r}</td>
                    <td class="col-gelb"><input type="number" id="y-${r}" oninput="calc(${r})"></td>
                    <td class="col-lila"><input type="number" id="p-${r}" oninput="calc(${r})"></td>
                    <td class="col-blau">
                        <input type="number" id="b-${r}" oninput="calc(${r})">
                        <input type="checkbox" id="bg-${r}" onchange="calc(${r})">
                    </td>
                    <td class="col-gruen"><input type="number" id="g-${r}" oninput="calc(${r})"></td> <!-- Input Neu -->
                    <td class="col-rot">
                        <div class="red-grid">
                            <div><span>W</span><input type="number" id="rW-${r}" oninput="calc(${r})"></div>
                            <div><span>S</span><input type="number" id="rS-${r}" oninput="calc(${r})"></div>
                            <div><span>#</span><input type="number" id="rA-${r}" oninput="calc(${r})"></div>
                        </div>
                    </td>
                    <td class="col-weiss"><input type="number" id="w-${r}" oninput="calc(${r})"></td>
                    <td class="col-pink"><input type="number" id="pi-${r}" oninput="calc(${r})"></td>
                    <td class="col-total"><span id="s-${r}">0</span></td>
                </tr>`;
        }

        function calc(r) {
            const y = +document.getElementById(`y-${r}`).value || 0;
            const p = (+document.getElementById(`p-${r}`).value || 0) * 2;
            let b = +document.getElementById(`b-${r}`).value || 0;
            if(document.getElementById(`bg-${r}`).checked) b *= 2;
            
            const gVal = +document.getElementById(`g-${r}`).value || 0; // Berechnung Neu
            
            const rW = +document.getElementById(`rW-${r}`).value || 0;
            const rS = +document.getElementById(`rS-${r}`).value || 0;
            const rA = +document.getElementById(`rA-${r}`).value || 0;
            const red = (rW - rS) * rA;
            
            const w = +document.getElementById(`w-${r}`).value || 0;
            const pi = +document.getElementById(`pi-${r}`).value || 0;
            
            const rowTotal = y + p + b + gVal + red + w + pi; // rowTotal angepasst
            document.getElementById(`s-${r}`).innerText = rowTotal;
            
            let total = 0;
            for(let i=1; i<=10; i++) total += +document.getElementById(`s-${i}`).innerText || 0;
            document.getElementById('grandTotal').innerText = total;
            
            save();
        }

        function save() {
            const state = {};
            document.querySelectorAll('input').forEach(input => {
                state[input.id] = input.type === 'checkbox' ? input.checked : input.value;
            });
            localStorage.setItem('pandaSave', JSON.stringify(state));
        }

        function load() {
            const saved = localStorage.getItem('pandaSave');
            if (saved) {
                const state = JSON.parse(saved);
                for (let id in state) {
                    const el = document.getElementById(id);
                    if (el) {
                        if (el.type === 'checkbox') el.checked = state[id];
                        else el.value = state[id];
                    }
                }
                for (let i = 1; i <= 10; i++) calc(i);
            }
        }

        function resetBoard() {
            if (confirm("Alle Scores löschen?")) {
                localStorage.removeItem('pandaSave');
                location.reload();
            }
        }

        window.onload = load;
    </script>
</body>
</html>
